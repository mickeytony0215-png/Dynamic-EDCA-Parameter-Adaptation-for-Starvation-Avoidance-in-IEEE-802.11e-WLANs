#
# EDCA Fairness Project - Master Configuration
# Common settings shared by all scenarios
#

[General]
network = EdcaFairnessNetwork
sim-time-limit = 30s
repeat = 5
seed-set = ${repetition}

# Recording
**.result-recording-modes = default
outputvectormanager-class = "omnetpp::envir::SqliteOutputVectorManager"
outputscalarmanager-class = "omnetpp::envir::SqliteOutputScalarManager"

# Radio settings
*.*.wlan[*].bitrate = 54Mbps
*.*.wlan[*].mac.dcf.channelAccess.cwMin = -1
*.*.wlan[*].mac.dcf.channelAccess.cwMax = -1

# Enable QoS (EDCA) on all stations
*.*.wlan[*].mac.qosStation = true
*.*.wlan[*].classifier.typename = "QosClassifier"

# ============================================================
# Server: 4 UDP sinks for each AC
# ============================================================
*.server.numApps = 4
*.server.app[*].typename = "UdpSink"
*.server.app[0].localPort = 5000    # Voice
*.server.app[1].localPort = 4000    # Video
*.server.app[2].localPort = 80      # Best Effort
*.server.app[3].localPort = 21      # Background

# ============================================================
# Voice stations (AC_VO): VoIP G.711 - CBR UDP
# ============================================================
*.voSta[*].numApps = 1
*.voSta[*].app[0].typename = "UdpBasicApp"
*.voSta[*].app[0].destAddresses = "server"
*.voSta[*].app[0].destPort = 5000
*.voSta[*].app[0].messageLength = 160B
*.voSta[*].app[0].sendInterval = 20ms
*.voSta[*].app[0].startTime = uniform(0s, 0.1s)
*.voSta[*].app[0].packetName = "voice"

# ============================================================
# Video stations (AC_VI): Video stream - CBR UDP
# ============================================================
*.viSta[*].numApps = 1
*.viSta[*].app[0].typename = "UdpBasicApp"
*.viSta[*].app[0].destAddresses = "server"
*.viSta[*].app[0].destPort = 4000
*.viSta[*].app[0].messageLength = 1280B
*.viSta[*].app[0].sendInterval = 10ms
*.viSta[*].app[0].startTime = uniform(0s, 0.1s)
*.viSta[*].app[0].packetName = "video"

# ============================================================
# Best Effort stations (AC_BE): Saturated UDP
# ============================================================
*.beSta[*].numApps = 1
*.beSta[*].app[0].typename = "UdpBasicApp"
*.beSta[*].app[0].destAddresses = "server"
*.beSta[*].app[0].destPort = 80
*.beSta[*].app[0].messageLength = 1500B
*.beSta[*].app[0].sendInterval = 1ms
*.beSta[*].app[0].startTime = uniform(0s, 0.1s)
*.beSta[*].app[0].packetName = "bestEffort"

# ============================================================
# Background stations (AC_BK): Low-rate CBR UDP
# ============================================================
*.bkSta[*].numApps = 1
*.bkSta[*].app[0].typename = "UdpBasicApp"
*.bkSta[*].app[0].destAddresses = "server"
*.bkSta[*].app[0].destPort = 21
*.bkSta[*].app[0].messageLength = 512B
*.bkSta[*].app[0].sendInterval = 100ms
*.bkSta[*].app[0].startTime = uniform(0s, 0.1s)
*.bkSta[*].app[0].packetName = "background"

# ============================================================
# Statistics collection
# ============================================================
**.app[*].**.throughput.result-recording-modes = +vector
**.mac.**.packetSentToPeer*.result-recording-modes = +vector
**.mac.dcf.channelAccess.channelOwnershipChanged.result-recording-modes = +vector
