#
# QAD-EDCA: Queue-Aware Dynamic EDCA parameter adaptation
# Mirrors baseline scenarios but with QAD-EDCA manager active
#

[Config QadEdca_N10]
description = "QAD-EDCA, 10 STAs, varying VO/VI ratio"
extends = General
*.hasQadManager = true
*.numVoStations = ${numVo=1,2,3,4}
*.numViStations = ${numVi=1,2,3,4}
*.numBeStations = ${numBe=4,3,2,1}
*.numBkStations = ${numBk=4,3,2,1}

# Replace Hcf with QadHcf (which uses QadEdca → QadEdcaf → QadTxopProcedure)
*.ap.wlan[*].mac.hcf.typename = "edcafairness.src.QadHcf"

# QAD-EDCA Manager parameters (defaults from NED, override here if needed)
*.qadManager.monitorInterval = 100ms
*.qadManager.queueThreshold = 0.8
*.qadManager.lossThreshold = 0.1
*.qadManager.aifsStep = 1
*.qadManager.cwScaleFactor = 2.0
*.qadManager.txopScaleFactor = 0.75
*.qadManager.recoveryFactor = 0.3

[Config QadEdca_N20]
description = "QAD-EDCA, 20 STAs, varying VO/VI ratio"
extends = General
*.hasQadManager = true
*.numVoStations = ${numVo=2,4,6,8}
*.numViStations = ${numVi=2,4,6,8}
*.numBeStations = ${numBe=8,6,4,2}
*.numBkStations = ${numBk=8,6,4,2}

# Replace Hcf with QadHcf (which uses QadEdca → QadEdcaf → QadTxopProcedure)
*.ap.wlan[*].mac.hcf.typename = "edcafairness.src.QadHcf"

# QAD-EDCA Manager parameters
*.qadManager.monitorInterval = 100ms

# ============================================================
# Threshold sensitivity sweep
# ============================================================
[Config QadEdca_ThresholdSweep]
description = "QAD-EDCA threshold sensitivity, N=10, heavy load"
extends = General
*.hasQadManager = true
*.numVoStations = 3
*.numViStations = 3
*.numBeStations = 2
*.numBkStations = 2

*.beSta[*].app[0].sendInterval = 1ms

# Replace Hcf with QadHcf (which uses QadEdca → QadEdcaf → QadTxopProcedure)
*.ap.wlan[*].mac.hcf.typename = "edcafairness.src.QadHcf"

# Sweep thresholds
*.qadManager.queueThreshold = ${qTh=0.5, 0.7, 0.8, 0.9}
*.qadManager.lossThreshold = ${pTh=0.05, 0.1, 0.15, 0.2}
