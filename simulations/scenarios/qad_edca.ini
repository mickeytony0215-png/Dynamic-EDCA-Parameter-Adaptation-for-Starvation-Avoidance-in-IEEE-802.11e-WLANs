#
# QAD-EDCA: Queue-Aware Dynamic EDCA parameter adaptation
# Mirrors baseline scenarios but with QAD-EDCA manager active
#

[Config QadEdca_N10]
description = "QAD-EDCA, 10 STAs, varying VO/VI ratio"
extends = General
*.numVoStations = ${numVo=1,2,3,4}
*.numViStations = ${numVi=1,2,3,4}
*.numBeStations = ${numBe=4,3,2,1}
*.numBkStations = ${numBk=4,3,2,1}

# Enable QAD-EDCA manager on the AP
# (Requires QadEdcaManager module to be compiled and linked)
# *.ap.hasQadEdca = true
# *.ap.qadEdca.monitorInterval = 100ms
# *.ap.qadEdca.queueThreshold = 0.8
# *.ap.qadEdca.lossThreshold = 0.1
# *.ap.qadEdca.aifsStep = 1
# *.ap.qadEdca.cwScaleFactor = 2.0
# *.ap.qadEdca.txopScaleFactor = 0.75
# *.ap.qadEdca.recoveryFactor = 0.3

[Config QadEdca_N20]
description = "QAD-EDCA, 20 STAs, varying VO/VI ratio"
extends = General
*.numVoStations = ${numVo=2,4,6,8}
*.numViStations = ${numVi=2,4,6,8}
*.numBeStations = ${numBe=8,6,4,2}
*.numBkStations = ${numBk=8,6,4,2}

# Enable QAD-EDCA (uncomment after module is compiled)
# *.ap.hasQadEdca = true
# *.ap.qadEdca.monitorInterval = 100ms

# ============================================================
# Threshold sensitivity sweep
# ============================================================
[Config QadEdca_ThresholdSweep]
description = "QAD-EDCA threshold sensitivity, N=10, heavy load"
extends = General
*.numVoStations = 3
*.numViStations = 3
*.numBeStations = 2
*.numBkStations = 2

*.beSta[*].app[0].sendInterval = 1ms

# Sweep thresholds
# *.ap.qadEdca.queueThreshold = ${qTh=0.5, 0.7, 0.8, 0.9}
# *.ap.qadEdca.lossThreshold = ${pTh=0.05, 0.1, 0.15, 0.2}
