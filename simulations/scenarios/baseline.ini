#
# Baseline: Standard EDCA with fixed default parameters
# Demonstrates starvation under varying high-priority load
#

[Config Baseline_N5]
description = "Standard EDCA, 5 STAs, varying VO/VI ratio"
extends = General
*.numVoStations = ${numVo=0,1,1,2}
*.numViStations = ${numVi=1,1,2,2}
*.numBeStations = ${numBe=2,2,1,1}
*.numBkStations = ${numBk=2,1,1,0}

[Config Baseline_N10]
description = "Standard EDCA, 10 STAs, varying VO/VI ratio"
extends = General
*.numVoStations = ${numVo=1,2,3,4}
*.numViStations = ${numVi=1,2,3,4}
*.numBeStations = ${numBe=4,3,2,1}
*.numBkStations = ${numBk=4,3,2,1}

[Config Baseline_N15]
description = "Standard EDCA, 15 STAs, varying VO/VI ratio"
extends = General
*.numVoStations = ${numVo=1,3,4,6}
*.numViStations = ${numVi=2,3,5,6}
*.numBeStations = ${numBe=6,5,3,2}
*.numBkStations = ${numBk=6,4,3,1}

[Config Baseline_N20]
description = "Standard EDCA, 20 STAs, varying VO/VI ratio"
extends = General
*.numVoStations = ${numVo=2,4,6,8}
*.numViStations = ${numVi=2,4,6,8}
*.numBeStations = ${numBe=8,6,4,2}
*.numBkStations = ${numBk=8,6,4,2}

# ============================================================
# Load sweep: fix N=10, vary BE send interval for load levels
# ============================================================
[Config Baseline_LoadSweep]
description = "Standard EDCA, N=10, varying network load"
extends = General
*.numVoStations = 2
*.numViStations = 2
*.numBeStations = 3
*.numBkStations = 3

# Load levels: light(10ms) / medium(3ms) / heavy(1ms) / saturated(0.3ms)
*.beSta[*].app[0].sendInterval = ${beInterval=10ms, 3ms, 1ms, 0.3ms}
