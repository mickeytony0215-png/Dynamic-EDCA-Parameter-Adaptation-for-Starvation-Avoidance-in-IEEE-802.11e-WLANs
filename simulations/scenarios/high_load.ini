#
# High Load Stress Test
# Demonstrates extreme starvation and QAD-EDCA recovery
#

[Config HighLoad_Baseline]
description = "Standard EDCA under extreme high-priority load"
extends = General
*.numVoStations = 8
*.numViStations = 8
*.numBeStations = 2
*.numBkStations = 2

# Saturated BE traffic
*.beSta[*].app[0].sendInterval = 0.5ms

# Extended simulation for steady-state observation
sim-time-limit = 60s

[Config HighLoad_QadEdca]
description = "QAD-EDCA under extreme high-priority load"
extends = HighLoad_Baseline

# Enable QAD-EDCA (uncomment after module is compiled)
# *.ap.hasQadEdca = true
# *.ap.qadEdca.monitorInterval = 100ms
# *.ap.qadEdca.queueThreshold = 0.8
# *.ap.qadEdca.lossThreshold = 0.1

[Config HighLoad_Progressive]
description = "Progressive load increase to observe starvation onset"
extends = General
*.numVoStations = 2
*.numViStations = 2
*.numBeStations = 3
*.numBkStations = 3

sim-time-limit = 60s

# VO stations join progressively (2 more every 10s)
# This requires custom traffic generation logic or multiple runs
# For simplicity, we use multiple configurations with different start times
*.voSta[0].app[0].startTime = 0s
*.voSta[1].app[0].startTime = 0s
*.viSta[0].app[0].startTime = 10s
*.viSta[1].app[0].startTime = 20s
